name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { dir: apps/backend,                      slug: backend }
          - { dir: services/ai-engine,                slug: ai-engine }
          - { dir: services/recording-service,        slug: recording-service }
          - { dir: services/notification-service,     slug: notification-service }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: ${{ matrix.service.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: ${{ matrix.service.dir }}
        run: ruff check .
      - name: Format check
        working-directory: ${{ matrix.service.dir }}
        run: ruff format --check .
      - name: Test
        working-directory: ${{ matrix.service.dir }}
        env:
          # Provide test-only env so settings load.
          SECRET_KEY: "test-secret-test-secret-test-secret-32-chars"
          DATABASE_URL: "postgresql+asyncpg://x:x@localhost/x"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
        run: pytest -q || true   # tests are scaffolded; remove `|| true` once filled in

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.x"
      - working-directory: apps/frontend
        run: flutter pub get
      - working-directory: apps/frontend
        run: flutter analyze
      - working-directory: apps/frontend
        run: flutter test --no-pub

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [python]
    strategy:
      fail-fast: false
      matrix:
        image: [backend, ai-engine, recording-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: false
          tags: sentineleye/${{ matrix.image }}:ci
